<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440" role="img" aria-label="卡片二 痛点">
  <rect width="1080" height="1440" fill="#f8fafc"/>
  <circle cx="134" cy="135" r="44" fill="#1f2937"/>
  <text x="198" y="128" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">团队痛点</text>
  <text x="198" y="171" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="24" fill="#475569">会议记录不等于行动推进</text>
  <text x="84" y="292" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="74" font-weight="900" fill="#0f172a">纪要很完整</text>
  <text x="84" y="386" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="74" font-weight="900" fill="#dc2626">任务却没人领</text>
  <rect x="84" y="492" width="912" height="164" rx="28" fill="#fee2e2"/>
  <text x="128" y="558" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="34" font-weight="700" fill="#7f1d1d">摘要太长</text>
  <text x="128" y="612" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="30" fill="#7f1d1d">成员回头再看，仍要自己找重点。</text>
  <rect x="84" y="704" width="912" height="164" rx="28" fill="#ffedd5"/>
  <text x="128" y="770" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="34" font-weight="700" fill="#7c2d12">责任不清</text>
  <text x="128" y="824" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="30" fill="#7c2d12">结论有了，但负责人和期限丢了。</text>
  <rect x="84" y="916" width="912" height="164" rx="28" fill="#dbeafe"/>
  <text x="128" y="982" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="34" font-weight="700" fill="#1e3a8a">风险不跟进</text>
  <text x="128" y="1036" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="30" fill="#1e3a8a">待确认事项散落在聊天记录里。</text>
  <text x="84" y="1230" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">好的纪要要直接推动下一步。</text>
  <text x="84" y="1320" font-family="'Hiragino Sans GB', 'Heiti SC', Arial, sans-serif" font-size="30" fill="#64748b">02 / 06</text>
</svg>
