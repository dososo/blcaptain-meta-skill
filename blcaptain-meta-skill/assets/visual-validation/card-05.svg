    <rect x="84" y="1200" width="912" height="112" rx="24" fill="#ffffff"/>
    <text x="126" y="1270" font-size="34" font-weight="800" fill="#ea580c">06</text>
    <text x="218" y="1270" font-size="34" font-weight="700" fill="#0f172a">上线前检查会</text>
